query CartInput(
  $b2bTags: [String!]! = ["b2b"]
  $collectionIds: [ID!]
) {
  cart {
    buyerIdentity {
      purchasingCompany {
        company {
          id
        }
      }
      customer {
        hasAnyTag(tags: $b2bTags)
      }
    }
    lines {
      id
      quantity
      cost {
        subtotalAmount {
          amount
        }
        totalAmount {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          product {
            id
            inCollections(ids: $collectionIds) {
              collectionId
              isMember
            }
          }
        }
      }
    }
  }
  discount {
    discountClasses
    metafield(namespace: "$app:margin_guard", key: "config") {
      jsonValue
    }
  }
  enteredDiscountCodes {
    code
    rejectable
  }
  localization {
    language {
      isoCode
    }
  }
}
