query CartInput(
  $b2bTags: [String!]! = ["b2b"]
) {
  cart {
    buyerIdentity {
      purchasingCompany {
        company {
          id
        }
      }
      customer {
        hasAnyTag(tags: $b2bTags)
      }
    }
    lines {
      id
      quantity
      cost {
        subtotalAmount {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          product {
            id
          }
        }
      }
    }
  }
  discount {
    discountClasses
    metafield(namespace: "$app:margin_guard", key: "config") {
      jsonValue
    }
  }
}
