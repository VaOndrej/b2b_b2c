query CartValidationsGenerateRunInput(
  $b2bTags: [String!]! = ["b2b"]
  $collectionIds: [ID!]
) {
  cart {
    buyerIdentity {
      purchasingCompany {
        company {
          id
        }
      }
      customer {
        id
        hasAnyTag(tags: $b2bTags)
      }
    }
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
        subtotalAmount {
          amount
        }
        totalAmount {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          product {
            id
            title
            inCollections(ids: $collectionIds) {
              collectionId
              isMember
            }
          }
        }
      }
    }
  }
  validation {
    metafield(namespace: "$app:margin_guard", key: "config") {
      jsonValue
    }
  }
  localization {
    language {
      isoCode
    }
  }
}
